# Categories and example payloads for the transport-layer protocol messages.
# Keyed by message class name (see python/otio_sync_core/protocol_messages.py).
# `_category` groups messages in the generated docs; the remaining keys are
# named example payloads. Messages omitted here still appear, using their
# class-derived schema/event/fields.

WhoIsMaster:
  _category: Session
  default:
    requester_guid: "peer-abc123"

IAmMaster:
  _category: Session
  default:
    master_guid: "peer-master-001"

StateRequest:
  _category: Session
  default:
    target_guid: "peer-master-001"
    requester_guid: "peer-abc123"

StateSnapshot:
  _category: Session
  default:
    target_guid: "peer-abc123"
    timelines: {"tl-guid-1": {"OTIO_SCHEMA": "Timeline.1", "name": "Sequence 1"}}
    active_timeline_guid: "tl-guid-1"
    snapshot_timestamp: 1738339200.0

AddTimeline:
  _category: Timeline
  default:
    timeline_guid: "tl-guid-1"
    timeline: {"OTIO_SCHEMA": "Timeline.1", "name": "Sequence 1"}
    sync_timestamp: 1738339200.0

RenameTimeline:
  _category: Timeline
  default:
    timeline_guid: "tl-guid-1"
    name: "Reel 2 — Director Cut"
    sync_timestamp: 1738339200.0

PlaybackSettingsSet:
  _category: Settings
  default:
    playing: true
    current_time: {"OTIO_SCHEMA": "RationalTime.1", "value": 48.0, "rate": 24.0}
    looping: false
    timeline_guid: "tl-guid-1"
    sync_timestamp: 1738339200.0

DisplaySettingsSet:
  _category: Settings
  default:
    pan: [0.0, 0.0]
    zoom: 1.0
    exposure: 0.5
    channel: "RGBA"
    sync_timestamp: 1738339200.0

SelectionSet:
  _category: Selection
  default:
    clip_guid: "clip-guid-001"
    view_mode: "sequence"
    sync_timestamp: 1738339200.0

PartialAnnotation:
  _category: Annotation
  default:
    clip_guid: "clip-guid-001"
    frame: 12.0
    fps: 24.0
    events: [{"OTIO_SCHEMA": "PaintStart.1", "uuid": "stroke-001"}]

SetProperty:
  _category: OTIO Session
  default:
    target_uuid: "obj-guid-001"
    path: "name"
    value: "Renamed Clip"
    sync_timestamp: 1738339200.0

InsertChild:
  _category: OTIO Session
  default:
    parent_uuid: "track-guid-001"
    index: -1
    child_data: {"OTIO_SCHEMA": "Clip.1", "name": "New Clip"}
    sync_timestamp: 1738339200.0

MoveChild:
  _category: OTIO Session
  default:
    parent_uuid: "track-guid-001"
    child_uuid: "clip-guid-001"
    to_index: 2
    sync_timestamp: 1738339200.0

RemoveChild:
  _category: OTIO Session
  default:
    parent_uuid: "track-guid-001"
    child_uuid: "clip-guid-001"
    sync_timestamp: 1738339200.0

ReplaceAnnotationCommands:
  _category: OTIO Session
  default:
    annotation_clip_guid: "ann-clip-001"
    commands: [{"OTIO_SCHEMA": "TextAnnotation.1", "text": "Fix lighting"}]
    sync_timestamp: 1738339200.0
