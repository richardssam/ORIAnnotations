# Unified documentation generator configuration.
# Controls both OTIO SyncEvent and Protocol Message documentation.

meta:
  title: "OTIO Sync Protocol"
  otio_input: ../otio_event_plugin/schemadefs/SyncEvent.py
  output: otio_sync_docs.html
  # Uncomment to add an introduction section from a Markdown file:
  introduction: introduction.md


protocol_messages:
  # Categories and example payloads for transport-layer protocol messages.
  # Keyed by message class name (see python/otio_sync_core/protocol_messages.py).
  # _category groups messages in the generated docs; remaining keys are named
  # example payloads. Messages omitted here still appear using class-derived fields.

  WhoIsMaster:
    _category: Session
    default:
      requester_guid: "peer-abc123"

  IAmMaster:
    _category: Session
    default:
      master_guid: "peer-master-001"

  StateRequest:
    _category: Session
    default:
      target_guid: "peer-master-001"
      requester_guid: "peer-abc123"

  NewPresenter:
    _category: Session
    default:
      presenter_hash: "d3447b5cb61b41de73a2de39c4f06ab790e66e4cad81f7d449c0147a546244b5"
      timestamp: "2025-01-31T16:14:00Z"

  NewParticipant:
    _category: Session
    default:
      timestamp: "2025-01-31T16:14:05Z"

  SharedKeyRequest:
    _category: Session
    default:
      key: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8A...\n-----END PUBLIC KEY-----"
      timestamp: "2025-01-31T16:14:00Z"

  SharedKeyResponse:
    _category: Session
    default:
      key: "encrypted_shared_key_base64_encoded_string"
      timestamp: "2025-01-31T16:14:01Z"

  StateSnapshot:
    _category: Session
    default:
      target_guid: "peer-abc123"
      timelines: {"tl-guid-1": {"OTIO_SCHEMA": "Timeline.1", "name": "Sequence 1"}}
      active_timeline_guid: "tl-guid-1"
      snapshot_timestamp: 1738339200.0

  AddTimeline:
    _category: Timeline
    default:
      timeline_guid: "tl-guid-1"
      timeline: {"OTIO_SCHEMA": "Timeline.1", "name": "Sequence 1"}
      sync_timestamp: 1738339200.0

  RenameTimeline:
    _category: Timeline
    default:
      timeline_guid: "tl-guid-1"
      name: "Reel 2 — Director Cut"
      sync_timestamp: 1738339200.0

  PlaybackSettingsSet:
    _category: Settings
    default:
      playing: true
      current_time: {"OTIO_SCHEMA": "RationalTime.1", "value": 48.0, "rate": 24.0}
      looping: false
      timeline_guid: "tl-guid-1"
      sync_timestamp: 1738339200.0

  DisplaySettingsSet:
    _category: Settings
    default:
      pan: [0.0, 0.0]
      zoom: 1.0
      exposure: 0.5
      channel: "RGBA"
      sync_timestamp: 1738339200.0

  SelectionSet:
    _category: Selection
    default:
      clip_guid: "clip-guid-001"
      view_mode: "sequence"
      sync_timestamp: 1738339200.0

  PartialAnnotation:
    _category: Annotation
    default:
      clip_guid: "clip-guid-001"
      frame: 12.0
      fps: 24.0
      events: [{"OTIO_SCHEMA": "PaintStart.1", "uuid": "stroke-001"}]

  SetProperty:
    _category: OTIO Session
    default:
      target_uuid: "obj-guid-001"
      path: "name"
      value: "Renamed Clip"
      sync_timestamp: 1738339200.0

  InsertChild:
    _category: OTIO Session
    default:
      parent_uuid: "track-guid-001"
      index: -1
      child_data: {"OTIO_SCHEMA": "Clip.1", "name": "New Clip"}
      sync_timestamp: 1738339200.0

  MoveChild:
    _category: OTIO Session
    default:
      parent_uuid: "track-guid-001"
      child_uuid: "clip-guid-001"
      to_index: 2
      sync_timestamp: 1738339200.0

  RemoveChild:
    _category: OTIO Session
    default:
      parent_uuid: "track-guid-001"
      child_uuid: "clip-guid-001"
      sync_timestamp: 1738339200.0

  ReplaceAnnotationCommands:
    _category: OTIO Session
    default:
      annotation_clip_guid: "ann-clip-001"
      commands: [{"OTIO_SCHEMA": "TextAnnotation.1", "text": "Fix lighting"}]
      sync_timestamp: 1738339200.0


