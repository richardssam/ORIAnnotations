settings:
  executables:
    xstudio: "/Users/sam/git/xstudio/build/xSTUDIO.app/Contents/MacOS/xstudio.bin"
    xstudio_python: "/Users/sam/git/xstudio/build/vcpkg_installed/arm-osx/tools/python3/python3"
    openrv: "/Applications/openRV.app/Contents/MacOS/RV"
#    openrv: "/Users/sam/git/openrv_annotations/_build/stage/app/RV.app/Contents/MacOS/RV"

# Canonical test media — generated by test_media/create_test_media.sh
# Run that script once before executing tests that reference these paths.
media:
  encoded:
    sparks:   "test_media/source/encoded_notc/sparks.mov"
    laser:    "test_media/source/encoded_notc/laser_ACES_sRGB.mov"
    car:      "test_media/source/encoded_notc/car_ACES_sRGB.mov"
    warp:     "test_media/source/encoded_notc/warp_ACES_sRGB.mov"
    graphic:  "test_media/source/encoded_notc/graphic_ACES_sRGB.mov"
  frames:
    sparks:   "test_media/source/frames/sparks/sparks_ACES2065-1.%05d.exr"
    laser:    "test_media/source/frames/laser/laser_ACES2065-1.%08d.exr"
    car:      "test_media/source/frames/car/car_ACES2065-1.%08d.exr"
    warp:     "test_media/source/frames/warp/warp_ACES2065-1.%08d.exr"
    graphic:  "test_media/source/frames/graphic/graphic_ACES2065-1.%08d.exr"

tests:
  - name: "xstudio_vs_openrv_basic_annotation_notc"
    recording: "recordings/single_clip_annotation_notc.jsonl"
    checkpoint_validation_delay: 2.5
    apps:
      - "xstudio"
      - "openrv"
  - name: "add_media"
    recording: "recordings/add_media_notc.jsonl"
    script_driven: true
    apps:
      - "xstudio"
      - "openrv"
  - name: "delete_media_openrv_noscript"
    recording: "recordings/delete_media_notc.jsonl"
    script_driven: false
    apps:
      - "openrv"
      - "openrv"
  - name: "delete_media_openrv"
    #recording: "recordings/delete_media_notc.jsonl"
    script_driven: true
    commands:
      - action: "add_media"
        url: "test_media/source/encoded_notc/car_ACES_sRGB.mov"
      - action: "add_media"
        url: "test_media/source/encoded_notc/graphic_ACES_sRGB.mov"
      - action: 'set_selection'
        name: "car_ACES_sRGB.mov"
      - action: "delete_media"
        name: "graphic_ACES_sRGB.mov"
      - action: 'set_selection'
        name: "car_ACES_sRGB.mov"
    apps:
      - "openrv"
      - "openrv"
  - name: "delete_media_xstudio"
    #recording: "recordings/delete_media_notc.jsonl"
    script_driven: true
    commands:
      - action: "add_media"
        url: "test_media/source/encoded_notc/car_ACES_sRGB.mov"
      - action: "add_media"
        url: "test_media/source/encoded_notc/graphic_ACES_sRGB.mov"
      - action: 'set_selection'
        name: "car_ACES_sRGB.mov"
      - action: "delete_media"
        name: "graphic_ACES_sRGB.mov"
      - action: 'set_selection'
        name: "car_ACES_sRGB.mov"
    apps:
      - "xstudio"
      - "openrv"
  - name: "reorder_media"
    recording: "recordings/reorder_media_notc_v2.jsonl"
    script_driven: false
    checkpoint_validation_delay: 4.5
    apps:
      - "openrv"
      - "xstudio"
  - name: "xstudio_selects"
    recording: "recordings/xstudio_selects.jsonl"
    #script_driven: true
    apps:
      - "openrv"
      - "xstudio"
  #- name: "missing_media"
  #  recording: "recordings/missing_media.jsonl"
  #  script_driven: true
  #  apps:
  #    - "openrv"
  #    - "xstudio"
  - name: "text_annotations_notc"
    recording: "recordings/text_annotations_notc.jsonl"
    script_driven: false
    apps:
      - "openrv"
      - "xstudio"
  - name: "text_annotations_xstudio_to_rv"
    recording: "recordings/text_annotations_xstudio_to_rv.jsonl"
    script_driven: false
    apps:
      - "openrv"
      - "xstudio"
  - name: "delete_timeline"
    recording: "recordings/delete_timeline.jsonl"
    script_driven: false
    apps:
      - "openrv"
      - "xstudio"

  # OTIO import sync tests (§9 of otio-import-sync change).
  # Fixture: examples/otio_sample.rv is otio_test_quicktime.otio already imported into RV.
  # Both tests confirm the full round-trip: imported OTIO → sync → peer export ≈ reference.
  - name: "otio_import_rv_to_rv"
    script_driven: true
    convergence_wait: 8.0
    fixtures:
      - "examples/otio_sample.rv"  # app[0]: RV master with OTIO pre-loaded
      - null                        # app[1]: RV peer starts empty, receives via sync
    otio_compare:
      reference: "test_media/source/otio_test_quicktime.otio"
      export_delay: 5.0
    apps:
      - "openrv"
      - "openrv"

  - name: "otio_import_rv_to_xstudio"
    script_driven: true
    convergence_wait: 8.0
    fixtures:
      - "examples/otio_sample.rv"  # app[0]: RV master with OTIO pre-loaded
      - null                        # app[1]: xStudio peer starts empty, receives via sync
    otio_compare:
      reference: "test_media/source/otio_test_quicktime.otio"
      export_delay: 5.0
    apps:
      - "openrv"
      - "xstudio"

  - name: "otio_import_xstudio_to_rv"
    script_driven: true
    convergence_wait: 8.0
    fixtures:
      - "examples/otio_sample.rv"  # app[0]: RV master with OTIO pre-loaded
      - null                        # app[1]: xStudio peer starts empty, receives via sync
    otio_compare:
      reference: "test_media/source/otio_test_quicktime.otio"
      export_delay: 5.0
    apps:
      - "openrv"
      - "xstudio"
  - name: "otio_import_rv_to_xstudio"
    script_driven: true
    convergence_wait: 8.0
    fixtures:
      - "examples/otio_sample.rv"  # app[0]: RV master with OTIO pre-loaded
      - null                        # app[1]: xStudio peer starts empty, receives via sync
    otio_compare:
      reference: "test_media/source/otio_test_quicktime.otio"
      export_delay: 5.0
    apps:
      - "xstudio"
      - "openrv"