  # OTIO import sync tests (§9 of otio-import-sync change).
  # Fixture: examples/otio_sample.rv is otio_test_quicktime.otio already imported into RV.
  # Both tests confirm the full round-trip: imported OTIO → sync → peer export ≈ reference.
  - name: "otio_import_rv_to_rv"
    script_driven: true
    convergence_wait: 8.0
    fixtures:
      - "examples/otio_sample.rv"  # app[0]: RV master with OTIO pre-loaded
      - null                        # app[1]: RV peer starts empty, receives via sync
    otio_compare:
      reference: "test_media/source/otio_test_quicktime.otio"
      export_delay: 5.0
    apps:
      - "openrv"
      - "openrv"

  - name: "otio_import_rv_to_xstudio"
    script_driven: true
    convergence_wait: 8.0
    fixtures:
      - "examples/otio_sample.rv"  # app[0]: RV master with OTIO pre-loaded
      - null                        # app[1]: xStudio peer starts empty, receives via sync
    otio_compare:
      reference: "test_media/source/otio_test_quicktime.otio"
      export_delay: 5.0
    apps:
      - "openrv"
      - "xstudio"

  - name: "otio_import_xstudio_to_rv"
    script_driven: true
    convergence_wait: 8.0
    fixtures:
      - "examples/otio_sample.rv"  # app[0]: RV master with OTIO pre-loaded
      - null                        # app[1]: xStudio peer starts empty, receives via sync
    otio_compare:
      reference: "test_media/source/otio_test_quicktime.otio"
      export_delay: 5.0
    apps:
      - "openrv"
      - "xstudio"

  - name: "otio_xstudio_timeline_changes"
    recording: "recordings/otio_xstudio_timeline_changes.jsonl"
    script_driven: false
    apps:
      - "xstudio"
      - "xstudio"

  - name: "color_tests"
    recording: "recordings/color_tests.jsonl"
    script_driven: false
    apps:
      - "xstudio"
      - "openrv"

  # Annotation-geometry round-trip tests (sync-test-draw-annotation change).
  # Each drives one app to natively draw an annotation via `draw_annotation`
  # (real send path, no OTIO-import codec involved) and asserts the peer's
  # native readback round-trips to the value predicted by feeding the driver's
  # nominal input through both apps' real codec constants — see
  # `sync_test.annotation_assertions`. This is the reverse-direction coverage
  # `testchart/` never exercises (it only tests OTIO import -> app).
  - name: "openrv_draws_pen_xstudio_verifies"
    script_driven: true
    commands:
      - action: "add_media"
        url: "test_media/source/encoded_notc/car_ACES_sRGB.mov"
      - action: "set_selection"
        name: "car_ACES_sRGB.mov"
      - action: "draw_annotation"
        kind: "pen"
        # RV-native width. 3.0 (the original value) produced an OTIO size of
        # 5.0 and an xStudio thickness of 2.8125 — ~940x xs_annotation_codec's
        # own default pen thickness (0.003) and easily large enough to wash
        # out the whole frame. 0.01 lands close to that default instead.
        width: 0.01
        # Mid-intensity, non-primary color (not 0/1 in any channel), same
        # convention as the rect/ellipse tests, so a colorspace/exposure
        # transform would visibly shift it.
        color: [0.75, 0.55, 0.2, 1.0]
    annotation_geometry:
      driver: "openrv"
      peer: "xstudio"
      kind: "pen"
      nominal: 0.01
      visual_check: true
    apps:
      - "openrv"
      - "xstudio"

  - name: "xstudio_draws_pen_openrv_verifies"
    script_driven: true
    commands:
      - action: "add_media"
        url: "test_media/source/encoded_notc/car_ACES_sRGB.mov"
      - action: "set_selection"
        name: "car_ACES_sRGB.mov"
      - action: "draw_annotation"
        kind: "pen"
        # xStudio-native thickness, close to xs_annotation_codec's own
        # default (0.003) rather than the original 0.01 (~3x that default).
        thickness: 0.004
        # Mid-intensity, non-primary color (not 0/1 in any channel), same
        # convention as the rect/ellipse tests.
        color: [0.25, 0.5, 0.75, 1.0]
    annotation_geometry:
      driver: "xstudio"
      peer: "openrv"
      kind: "pen"
      nominal: 0.004
      visual_check: true
    apps:
      - "xstudio"
      - "openrv"

  - name: "openrv_draws_rect_xstudio_verifies"
    script_driven: true
    commands:
      - action: "add_media"
        url: "test_media/source/encoded_notc/car_ACES_sRGB.mov"
      - action: "set_selection"
        name: "car_ACES_sRGB.mov"
      - action: "draw_annotation"
        kind: "rect"
        # RV-native border width. 1.0 (the original value) produced an OTIO
        # size of 2.0 and an xStudio thickness of 1.125 — bigger than the
        # entire ±1 frame, i.e. a full-screen wash regardless of color.
        # 0.005 lands close to xs_annotation_codec's own default pen
        # thickness (0.003) instead, so the outline should now be a normal,
        # visible border rather than a solid fill.
        border_width: 0.005
        # Mid-intensity, non-primary color (not 0/1 in any channel) so a
        # colorspace/exposure transform would visibly shift it, distinct from
        # a plain white/black wash.
        border_rgba: [0.65, 0.25, 0.2, 1.0]
        # Transparent fill: xStudio tessellates shapes into an outline-only
        # stroke and never reads inner_rgba, so a filled rect on the RV side
        # (which does support fill) vs. an outline-only render on xStudio is
        # not an apples-to-apples visual comparison. Transparent on both
        # sides isolates the border-thickness comparison. A filled variant
        # is still useful as a separate check (does RV's own fill rendering
        # look right) — just not for comparing border size cross-app.
        inner_rgba: [0.0, 0.0, 0.0, 0.0]
    annotation_geometry:
      driver: "openrv"
      peer: "xstudio"
      kind: "rect"
      nominal: 0.005
      # sync-test-frame-capture: also capture xStudio's rendered frame and
      # verify the border is actually the right thickness on screen, not just
      # numerically self-consistent — this is exactly the check that would
      # have caught the 2x rect-border bug automatically.
      visual_check: true
    apps:
      - "openrv"
      - "xstudio"

  - name: "openrv_draws_ellipse_xstudio_verifies"
    script_driven: true
    commands:
      - action: "add_media"
        url: "test_media/source/encoded_notc/car_ACES_sRGB.mov"
      - action: "set_selection"
        name: "car_ACES_sRGB.mov"
      - action: "draw_annotation"
        kind: "ellipse"
        border_width: 0.005
        border_rgba: [0.65, 0.25, 0.2, 1.0]
        inner_rgba: [0.0, 0.0, 0.0, 0.0]
    annotation_geometry:
      driver: "openrv"
      peer: "xstudio"
      kind: "ellipse"
      nominal: 0.005
      visual_check: true
    apps:
      - "openrv"
      - "xstudio"

  - name: "openrv_draws_arrow_xstudio_verifies"
    script_driven: true
    commands:
      - action: "add_media"
        url: "test_media/source/encoded_notc/car_ACES_sRGB.mov"
      - action: "set_selection"
        name: "car_ACES_sRGB.mov"
      - action: "draw_annotation"
        kind: "arrow"
        thickness: 0.008
        color: [0.35, 0.65, 0.35, 1.0]
    annotation_geometry:
      driver: "openrv"
      peer: "xstudio"
      kind: "arrow"
      nominal: 0.008
      visual_check: true
    apps:
      - "openrv"
      - "xstudio"