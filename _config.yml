remote_theme: just-the-docs/just-the-docs
color_scheme: dark
plugins:
- jekyll-remote-theme
- jekyll-seo-tag

include: [docs]

exclude:
  - docs/html
  - docs/source
  - docs/doctrees
  - Makefile
  - AGENTS.md
  - docs/architecture.md
  - docs/introduction.md
  - docs/OTIO Sync Protocol Draft.md
  - docs/plugin_tasks.md
  - docs/openrv_constraints.md
  - docs/sync_viewer_constraints.md
  - docs/docs/xstudio_constraints.md
  - docs/conf.py
  - examples
  - test_media/source
  - openspec

title: "ORI Annotations Documentation"
